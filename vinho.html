<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vinho | Vinhos Raros</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar detail-topbar">
      <a class="brand" href="index.html" aria-label="Voltar para o início">
        <span class="brand-mark">VR</span>
        <span data-site-name>Vinhos Raros</span>
      </a>
      <a class="back-link" href="index.html">Voltar ao catalogo</a>
      <button class="cart-button" type="button" data-cart-toggle aria-label="Abrir carrinho">
        <svg class="cart-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span data-cart-count>0</span>
      </button>
    </header>

    <main data-detail-root></main>

    <aside class="cart-panel" data-cart-panel aria-label="Carrinho">
      <div class="cart-head">
        <h2>Carrinho</h2>
        <button class="icon-button" type="button" data-cart-toggle aria-label="Fechar carrinho">x</button>
      </div>
      <div class="cart-items" data-cart-items></div>
      <div class="cart-total">
        <span>Total</span>
        <strong data-cart-total>R$ 0</strong>
      </div>
      <button class="checkout" type="button">Finalizar pedido</button>
    </aside>
    <div class="scrim" data-cart-toggle data-scrim></div>

    <script src="app.js"></script>
    <script src="detail.js"></script>
  </body>
</html>
